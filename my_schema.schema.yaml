# Rime schema

__include: luna_pinyin.schema:/

schema:
  schema_id: my_schema
  name: 朙月拼音・改
  version: "2024.01.26"
  author:
    - Leng_yue57 <1210625283@qq.com>
  dependencies:
    - luna_pinyin

switches:
  - name: ascii_mode
    reset: 0
    states: ["中", "Ａ"]
  - name: full_shape
    states: ["半", "全"]
      #- name: extended_charset
      #  reset: 1
  - name: simplification
    states: ["繁", "简"]
  - name: ascii_punct
    reset: 0
    states: ["。，", ". , "]

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: "'"
  algebra:
    __patch:
      - pinyin:/abbreviation
      # - pinyin:/spelling_correction
      # - pinyin:/key_correction
  algebra:
    # 基本补足
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    - derive/ui$/uei/
    - derive/iu$/iou/
    - derive/^([^jqxy])un$/$1uen/
    - derive/ing$/ieng/
    - derive/^ying$/yeng/
    # 简化输入
    - derive/yu/v/
    - derive/([zcs]h)i$/$1/
    - derive/^([jqx])i(.+)$/$1$2/

translator:
  dictionary: luna_pinyin
  disable_user_dict_for_patterns:
    - "^啊*$"
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
    - xform/ieng/ing/
    - xform/yeng/ying/
    - xform/([jqx])([aon])/$1i$2/
    - xform/([jqx])e([^n])/$1ie$2/
    - xform/([jqx])eng/$1ing/
    - xform/(^|[^jqxy])v/$1yu/
    - xform/([zcs]h)($|[^aoeiu])/$1i$2
    # - xform/([zcs]h)$/$1i

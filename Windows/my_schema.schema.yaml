# Rime schema

__include: luna_pinyin.schema:/

schema:
  schema_id: my_schema
  name: 朙月拼音・改
  version: "2024.01.26"
  author:
    - Leng_yue57 <1210625283@qq.com>
  dependencies:
    - luna_pinyin

switches:
  - name: ascii_mode
    reset: 1
    states: ["中", "Ａ"]
  - name: full_shape
    states: ["半", "全"]
  - name: simplification
    states: ["繁", "简"]
  - name: ascii_punct
    reset: 0
    states: ["。，", ". , "]

extended_charset: 1

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZSC
  delimiter: "'"
  algebra:
    __patch:
      - pinyin:/abbreviation
  algebra:
    # 基本补足
    - derive/^([bpmf])o$/$1uo/
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    - derive/ui$/uei/
    - derive/iu$/iou/
    - derive/^([^jqxy])un$/$1uen/
    - derive/ing$/ieng/
    - derive/^ying$/yeng/
    # 简化输入
    - derive/ian$/ien/
    - derive/^yan$/yen/
    - derive/^yuan$/yuen/
    - derive/^yu/v/
    - derive/^zh/Zh?/
    - derive/^ch/Ch?/
    - derive/^sh/Sh?/
    - derive/^([jqx])i(.+)$/$1$2/

translator:
  dictionary: luna_pinyin
  disable_user_dict_for_patterns:
    - "^啊*$"
  preedit_format:
    # 简化输入
    - xform/([jqx])n/$1in/
    - xform/([jqx])e/$1ie/
    - xform/(^|[^jqxyln])v/$1(yu)/
    - xform/S/(sh)/
    - xform/C/(ch)/
    - xform/Z/(zh)/
    - xform/yuen($|[^g])/yuan$1/
    - xform/yen($|[^g])/yan$1/
    - xform/ien($|[^g])/ian$1/
    # 基本补足
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
    - xform/ieng/ing/
    - xform/yeng/ying/
